name: AI Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ai-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Archon
        run: |
          python -m pip install --upgrade pip
          curl -fsSL https://archon.diy/install | INSTALL_DIR="$HOME/.local/bin" bash
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          archon version

      - name: Install code-reviewer
        run: |
          python -m pip install git+https://github.com/sahilsk11/code-reviewer.git

      - name: Run AI Code Review
        env:
          GH_TOKEN: ${{ github.token }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          code-review review \
            --repo . \
            --event-path "$GITHUB_EVENT_PATH" \
            --head-sha "$PR_HEAD_SHA" \
            --mode incremental
