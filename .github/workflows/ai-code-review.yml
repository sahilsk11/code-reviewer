name: AI Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ai-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    name: AI Code Review Runner
    runs-on: [self-hosted, linux, x64, code-reviewer]
    timeout-minutes: 30
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify runner tools
        run: |
          CODEX_BIN_PATH="$(command -v codex)"
          echo "CODEX_BIN_PATH=$CODEX_BIN_PATH" >> "$GITHUB_ENV"
          archon version
          codex --version
          codex login status
          gh --version

      - name: Install review tooling
        run: |
          python -m pip install --upgrade pip uv PyYAML

      - name: Install code-reviewer
        run: |
          python -m pip install -e .
          code-review --version

      - name: Run AI Code Review
        env:
          GH_TOKEN: ${{ github.token }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          for attempt in 1 2; do
            log_file="$RUNNER_TEMP/code-review-attempt-$attempt.log"
            code-review review \
              --repo . \
              --event-path "$GITHUB_EVENT_PATH" \
              --head-sha "$PR_HEAD_SHA" \
              --mode incremental 2>&1 | tee "$log_file"
            status="${PIPESTATUS[0]}"

            if [ "$status" -eq 247 ] && [ "$attempt" -eq 1 ] && ! grep -q '\[publish_review\] Started' "$log_file"; then
              echo "Archon workflow exited 247 before publishing started; waiting for active workflow lock before retrying once."
              for _ in $(seq 1 24); do
                if archon workflow status --json --cwd . 2>/dev/null | grep -q '"runs": \[\]'; then
                  break
                fi
                sleep 5
              done
              continue
            fi

            exit "$status"
          done

  required:
    name: AI Code Review
    runs-on: ubuntu-latest
    needs: review
    if: always()
    steps:
      - name: Enforce AI review result
        env:
          AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          REPOSITORY: ${{ github.repository }}
          REVIEW_RESULT: ${{ needs.review.result }}
        run: |
          if [ "$IS_DRAFT" = "true" ]; then
            echo "AI Code Review is required after the pull request is ready for review."
            exit 1
          fi

          if [ "$HEAD_REPOSITORY" != "$REPOSITORY" ]; then
            echo "AI Code Review is blocked for fork pull requests on the self-hosted runner."
            exit 1
          fi

          case "$AUTHOR_ASSOCIATION" in
            OWNER|MEMBER|COLLABORATOR) ;;
            *)
              echo "AI Code Review is blocked for author association: $AUTHOR_ASSOCIATION"
              exit 1
              ;;
          esac

          if [ "$REVIEW_RESULT" != "success" ]; then
            echo "AI Code Review runner job result: $REVIEW_RESULT"
            exit 1
          fi
