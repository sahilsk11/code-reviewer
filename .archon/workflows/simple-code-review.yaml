name: simple-code-review
description: |
  Use when: A tiny local file or diff needs a fast, cheap review pass.
  Input: JSON with `path` pointing at a local file to review.
  Output: Short review summary plus a final structured JSON payload.
  NOT for: Publishing GitHub comments, full PR context gathering, or multi-agent review.

provider: codex
model: gpt-5.3-codex-spark
modelReasoningEffort: high
worktree:
  enabled: false

nodes:
  - id: prepare_context
    bash: |
      set -euo pipefail
      python3 - <<'PY'
      import json
      import os
      from pathlib import Path

      payload = json.loads(os.environ.get("ARGUMENTS") or "{}")
      path = Path(payload["path"]).expanduser().resolve()
      code = path.read_text(encoding="utf-8")
      print(json.dumps({
          "path": str(path),
          "filename": path.name,
          "code": code,
      }, indent=2))
      PY

  - id: review_file
    context: fresh
    model: gpt-5.3-codex-spark
    effort: high
    prompt: |
      Review this tiny code change quickly.

      Prepared context:
      $prepare_context.output

      Requirements:
      - Keep the review short.
      - Report only concrete correctness issues.
      - Do not ask for tests unless there is a specific behavioral risk.
      - If there are no concrete issues, say so.
      - End with one fenced `json` block containing:
        {
          "summary": "short summary",
          "findings": [
            {
              "file": "filename",
              "line": 1,
              "severity": "low|medium|high",
              "blocking": true,
              "comment": "short actionable comment"
            }
          ],
          "check_conclusion": "success|failure"
        }
    depends_on: [prepare_context]
